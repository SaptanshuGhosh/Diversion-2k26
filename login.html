<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SmartEdu — Login</title>
  <link rel="stylesheet" href="shared.css"/>
  <style>
    body { overflow: hidden; height: 100vh; display: flex; flex-direction: column; }

    .hero-noise {
      position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px;
    }

    .orb {
      position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0;
    }
    .orb1 { width: 600px; height: 600px; background: rgba(91,110,248,.12); top: -200px; left: -200px; }
    .orb2 { width: 500px; height: 500px; background: rgba(168,85,247,.08); bottom: -150px; right: -150px; }

    .login-wrap {
      position: relative; z-index: 1;
      flex: 1; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 44px 42px 40px;
      width: 100%;
      max-width: 420px;
      animation: slideUp .5s cubic-bezier(.22,.68,0,1.2) both;
      box-shadow: 0 24px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(91,110,248,.05);
    }

    .login-logo {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }

    .login-logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; box-shadow: 0 0 24px var(--accent-glow);
    }

    .login-logo-name {
      font-family: var(--font-d); font-weight: 700; font-size: 20px;
    }

    .login-logo-sub {
      font-size: 10px; color: var(--muted); letter-spacing: .8px;
      text-transform: uppercase; font-family: var(--font-m);
    }

    .login-title {
      font-family: var(--font-d); font-weight: 700;
      font-size: 26px; letter-spacing: -.4px;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 13.5px; color: var(--text2); margin-bottom: 28px; line-height: 1.5;
    }

    /* Role selector */
    .role-tabs {
      display: grid; grid-template-columns: 1fr 1fr;
      background: var(--surface); border-radius: 12px; padding: 4px;
      border: 1px solid var(--border); margin-bottom: 26px; gap: 4px;
    }

    .role-tab {
      padding: 9px; border-radius: 9px; border: none;
      background: transparent; color: var(--muted);
      font-family: var(--font-b); font-weight: 600; font-size: 13px;
      cursor: pointer; transition: all .2s; display: flex;
      align-items: center; justify-content: center; gap: 6px;
    }

    .role-tab.active {
      background: var(--accent-dim);
      border: 1px solid rgba(91,110,248,.35);
      color: var(--accent2);
    }

    .field-group { display: flex; flex-direction: column; gap: 14px; margin-bottom: 22px; }

    .login-field { display: flex; flex-direction: column; gap: 7px; }

    .login-field label {
      font-size: 11px; color: var(--muted); font-weight: 600;
      text-transform: uppercase; letter-spacing: .7px; font-family: var(--font-m);
    }

    .login-field input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; color: var(--text);
      font-size: 14px; font-family: var(--font-b); outline: none;
      transition: border-color .2s, box-shadow .2s; width: 100%;
    }

    .login-field input:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .login-field input.err { border-color: var(--red) !important; }

    .login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent), #7B6EF6);
      color: #fff; border: none; border-radius: 12px;
      font-family: var(--font-b); font-weight: 700; font-size: 14.5px;
      cursor: pointer; box-shadow: 0 4px 20px var(--accent-glow);
      transition: all .2s; letter-spacing: .2px;
    }

    .login-btn:hover {
      opacity: .9; transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--accent-glow);
    }

    .login-btn:active { transform: translateY(0); }

    .login-btn:disabled {
      opacity: .5; cursor: not-allowed; transform: none !important;
      box-shadow: none !important;
    }

    .err-msg {
      color: var(--red); font-size: 12.5px; margin-top: -6px;
      min-height: 16px; font-family: var(--font-m);
    }

    .login-footer {
      margin-top: 22px; text-align: center;
      font-size: 12px; color: var(--muted);
    }

    .login-footer a {
      color: var(--accent2); text-decoration: none; font-weight: 600;
    }

    .login-footer a:hover { text-decoration: underline; }

    /* Hint for teacher code */
    .hint-row {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; background: rgba(245,200,66,.06);
      border: 1px solid rgba(245,200,66,.18); border-radius: 9px;
      margin-bottom: 20px; font-size: 12.5px; color: var(--yellow);
      font-family: var(--font-m); display: none;
    }

    .hint-row.show { display: flex; }

    .divider-line {
      height: 1px; background: var(--border);
      margin: 22px 0; position: relative;
    }

    .divider-line span {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: var(--card); padding: 0 12px;
      font-size: 11px; color: var(--muted);
      font-family: var(--font-m);
    }

    /* Loading spinner in btn */
    .btn-spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none; margin: 0 auto;
    }

    .login-btn.loading .btn-text { display: none; }
    .login-btn.loading .btn-spinner { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .login-box { padding: 32px 24px 28px; }
    }
  </style>
</head>
<body>

<div class="hero-noise"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<header>
  <a class="logo" href="index.html">
    <div class="logo-icon">🎓</div>
    <div>
      <div class="logo-name">SmartEdu</div>
      <div class="logo-sub">Smart Study Suite</div>
    </div>
  </a>
  <nav>
    <a class="nav-link" href="index.html">Home</a>
  </nav>
</header>

<div class="login-wrap">
  <div class="login-box">

    <div class="login-logo">
      <div class="login-logo-icon">🎓</div>
      <div>
        <div class="login-logo-name">SmartEdu</div>
        <div class="login-logo-sub">Smart Study Suite</div>
      </div>
    </div>

    <div class="login-title">Welcome back</div>
    <div class="login-sub">Sign in to continue your learning journey</div>

    <!-- Role selector -->
    <div class="role-tabs">
      <button class="role-tab active" id="tab-student" onclick="switchRole('student')">
        🎒 Student
      </button>
      <button class="role-tab" id="tab-teacher" onclick="switchRole('teacher')">
        📋 Teacher
      </button>
    </div>

    <!-- Form -->
    <div class="field-group">
      <div class="login-field">
        <label>Username / Email</label>
        <input type="text" id="f-username" placeholder="Enter your username or email"
          onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="login-field">
        <label>Password</label>
        <input type="password" id="f-password" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div class="login-field" id="code-field" style="display:none;">
      </div>
    </div>

    <div class="hint-row" id="teacher-hint">
      💡 Teacher accounts must be pre-registered by an administrator.
    </div>

    <div class="err-msg" id="login-err"></div>

    <button class="login-btn" id="login-btn" onclick="login()" style="margin-top:4px">
      <span class="btn-text">Sign In →</span>
      <div class="btn-spinner"></div>
    </button>

    <div class="divider-line"><span>or</span></div>


    <div class="login-footer" style="margin-top: 20px;">
      <span style="color:var(--muted)">New to SmartEdu?</span>
      <a href="register.html">Create an account</a>
      &nbsp;·&nbsp;
      <a href="#" onclick="forgotPassword()">Forgot password?</a>
    </div>

  </div>
</div>

<script src="shared.js"></script>
<script>
/* ─── Config ─────────────────────────────────────────────────── */
const TEACHER_CODE = 'admin123'; // Change to your school access code
const STORAGE_KEY  = 'SmartEdu_Session';

/* ─── Default demo accounts (stored in localStorage on first load) */
const DEFAULT_ACCOUNTS = [
  { username: 'Student@gmail.com',  password: 'student123', role: 'student',  name: 'Demo Student'  },
  { username: 'Teacher@gmail.com',  password: 'teach123',   role: 'teacher',  name: 'Demo Teacher'  },
];

function getAccounts() {
  try {
    const raw = localStorage.getItem('SmartEdu_Accounts');
    return raw ? JSON.parse(raw) : DEFAULT_ACCOUNTS;
  } catch { return DEFAULT_ACCOUNTS; }
}

/* ─── Role switch ─────────────────────────────────────────────── */
let currentRole = 'student';

function switchRole(role) {
  currentRole = role;
  document.getElementById('tab-student').classList.toggle('active', role === 'student');
  document.getElementById('tab-teacher').classList.toggle('active', role === 'teacher');
  document.getElementById('code-field').style.display   = role === 'teacher' ? 'flex' : 'none';
  document.getElementById('teacher-hint').classList.toggle('show', role === 'teacher');
  document.getElementById('login-err').textContent = '';
}

/* ─── Login ───────────────────────────────────────────────────── */
function login() {
  const username = document.getElementById('f-username').value.trim();
  const password = document.getElementById('f-password').value;
  const errEl    = document.getElementById('login-err');

  errEl.textContent = '';

  // Basic validation
  if (!username || !password) {
    errEl.textContent = 'Please enter your username and password.';
    if (!username) document.getElementById('f-username').classList.add('err');
    if (!password) document.getElementById('f-password').classList.add('err');
    return;
  }

  // Simulate loading
  const btn = document.getElementById('login-btn');
  btn.classList.add('loading');
  btn.disabled = true;

  setTimeout(() => {
    const accounts = getAccounts();
    const match = accounts.find(a =>
      (a.username === username || a.email === username) &&
      a.password === password &&
      (currentRole === 'teacher' ? a.role === 'teacher' : true)
    );

    if (match || isDevBypass(username, password)) {
      // Save session
      const session = {
        username: match ? match.username : username,
        name:     match ? match.name     : username,
        role:     currentRole,
        loggedIn: true,
        ts:       Date.now()
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
      window.location.href = currentRole === 'teacher' ? 'portal.html' : 'index.html';
    } else {
      errEl.textContent = 'Incorrect username or password.';
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }, 900);
}

/* Quick bypass for demo / no-password guest */
function isDevBypass(u, p) {
  return u === 'admin' && p === 'admin';
}

/* ─── Guest ───────────────────────────────────────────────────── */
function guestLogin() {
  const session = { username: 'guest', name: 'Guest', role: 'student', loggedIn: true, ts: Date.now() };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(session));
  window.location.href = 'index.html';
}

/* ─── Forgot password placeholder ────────────────────────────── */
function forgotPassword() {
  alert('Password reset: please contact your institution administrator or use the default credentials:\n\nStudent → username: student | password: student123\nTeacher → username: teacher | password: teach123');
}

/* ─── Clear err on type ───────────────────────────────────────── */
['f-username','f-password','f-code'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('input', () => {
    el.classList.remove('err');
    document.getElementById('login-err').textContent = '';
  });
});

/* ─── If already logged in, redirect ─────────────────────────── */
(function checkSession() {
  try {
    const session = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (session && session.loggedIn) {
      window.location.href = session.role === 'teacher' ? 'portal.html' : 'index.html';
    }
  } catch {}
})();
</script>
</body>
</html>
